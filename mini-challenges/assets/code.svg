<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Fundo preto sólido -->
  <rect width="512" height="512" fill="#000000" />
  
  <!-- Símbolos de código (Code tags e barra) centralizados -->
  <g stroke-linecap="round" stroke-linejoin="round">
    <!-- Tag de abertura "<" em azul-ciano vibrante -->
    <path d="M 239 240 L 202 256 L 239 272" fill="none" stroke="#00abc0" stroke-width="8" />
    
    <!-- Barra central "/" em cinza-claro/branco -->
    <path d="M 278 208 L 234 304" fill="none" stroke="#dcdcdc" stroke-width="8" />
    
    <!-- Tag de fechamento ">" em azul-ciano vibrante -->
    <path d="M 273 240 L 310 256 L 273 272" fill="none" stroke="#00abc0" stroke-width="8" />
  </g>
</svg>
